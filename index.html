<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачивание файлов</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .download-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            margin-top: 20px;
        }
        .download-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Доступные для скачивания файлы</h1>
    <p>Нажмите на кнопку ниже, чтобы загрузить архив на свой компьютер.</p>
    
    <!-- Укажите путь к вашему файлу в атрибуте href -->
    <a href="files/my-document.zip" class="download-btn" download>Скачать файл (ZIP)</a>
</body>
</html>
